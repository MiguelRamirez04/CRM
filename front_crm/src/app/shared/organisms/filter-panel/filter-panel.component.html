<!-- =====================================================================================
     FILTER PANEL - Panel lateral de filtros
     ===================================================================================== -->

<div *ngIf="visible" class="fixed inset-0 z-50 overflow-hidden">

  <!-- Overlay -->
  <div class="panel-overlay absolute inset-0 transition-opacity" (click)="onBackdropClick($event)"></div>

  <!-- Panel -->
  <div class="absolute inset-y-0 right-0 flex max-w-full pl-10">

    <div
      class="filter-panel-container w-screen transform transition-transform bg-white shadow-xl flex flex-col max-w-md m-4 rounded-2xl overflow-hidden"
      (click)="$event.stopPropagation()">

      <!-- Header -->
      <div class="panel-header flex justify-between items-center px-6 py-4 border-b border-gray-200 bg-white">
        <h2 class="panel-title text-xl font-bold text-gray-800">
          {{ config.titulo }}
        </h2>
        
        <!-- Indicador de filtros activos -->
        <app-status-dot 
          *ngIf="hayFiltrosActivos()" 
          texto="Activos" 
          tipo="nuevo"  
          [mostrarIcono]="false"
        ></app-status-dot>
        
        <button 
          type="button"
          class="close-button p-2 text-gray-500 hover:text-gray-700 transition-colors rounded-lg hover:bg-gray-100 cursor-pointer"
          (click)="onCerrar()" 
          aria-label="Cerrar">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Contenido scrolleable -->
      <div class="panel-content flex-1 overflow-y-auto px-6 py-6">

        <!-- GRUPOS DE CHECKBOXES -->
        <app-filter-checkbox-group
          *ngFor="let grupo of config.gruposCheckbox"
          [titulo]="grupo.titulo"
          [options]="grupo.opciones"
          [selectedValues]="getSelectedValues(grupo.id)"
          (selectionChange)="onCheckboxGroupChange(grupo.id, $event)"
        ></app-filter-checkbox-group>

        <!-- CAMPOS (FECHA, SELECT, ETC) -->
        <app-filter-field
          *ngFor="let campo of config.campos"
          [titulo]="campo.titulo"
          [type]="campo.tipo"
          [placeholder]="campo.placeholder"
          [options]="campo.opciones || []"
          [iconName]="campo.iconName"
          [value]="getFieldValue(campo.id)"
          (valueChange)="onFieldChange(campo.id, $event)"
        ></app-filter-field>

      </div>

      <!-- Footer -->
      <div class="panel-footer px-6 py-4 border-t border-gray-200 bg-white">
        <div class="footer-actions flex items-center justify-between gap-3">

          <!-- Botón de limpiar -->
          <app-ui-boton 
            *ngIf="config.mostrarBotonLimpiar"
            [variante]="'terciario'" 
            tipo="button" 
            [texto]="config.textoBotonLimpiar"
            [anchoCompleto]="false" 
            [mostrarIcono]="false" 
            (alClickear)="onLimpiar()"
            clasesAdicionales="px-4 py-2 text-sm font-medium">
          </app-ui-boton>

          <div class="footer-buttons-right flex gap-3 ml-auto">

            <!-- Botón de cerrar -->
            <app-ui-boton 
              [variante]="'cancelar'" 
              tipo="button" 
              [texto]="config.textoBotonCerrar"
              [anchoCompleto]="false" 
              [mostrarIcono]="false" 
              (alClickear)="onCerrar()"
              clasesAdicionales="px-4 py-2 text-sm font-medium">
            </app-ui-boton>

            <!-- Botón de aplicar -->
            <app-ui-boton 
              [variante]="'primario'" 
              tipo="button" 
              [texto]="config.textoBotonAplicar"
              [anchoCompleto]="false" 
              [mostrarIcono]="false" 
              (alClickear)="onAplicar()"
              clasesAdicionales="px-4 py-2 text-sm font-medium">
            </app-ui-boton>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
