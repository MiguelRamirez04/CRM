<header class="bg-gradient-to-r from-[#667eea] to-[#764ba2] shadow-xl rounded-b-2xl">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20 md:h-24">
      
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center">
        <img 
          src="/logoCompleto.png" 
          alt="Logo de la empresa"
          class="h-12 md:h-14 w-auto rounded-lg shadow-sm ring-1 ring-white/20"
        />
      </div>
      
      <!-- Mensaje de bienvenida -->
      <div class="hidden md:flex items-center text-white">
        <svg class="w-6 h-6 mr-2 opacity-90 animate-pulse-soft" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
        <p class="text-lg md:text-xl font-medium drop-shadow-sm">
          Bienvenido, <span class="font-extrabold tracking-wide">{{ nombreUsuario }}</span>
        </p>
      </div>
      
      <!-- Botón cerrar sesión -->
      <div class="flex items-center">
        <button
          type="button"
          (click)="confirmarCerrarSesion()"
          class="flex items-center px-4 md:px-5 py-2.5 md:py-3 bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white rounded-xl transition-all duration-300 border border-white/30 hover:border-white/50 shadow-md hover:shadow-lg"
        >
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span class="font-semibold hidden sm:inline">Cerrar sesión</span>
          <span class="font-semibold sm:hidden">Salir</span>
        </button>
      </div>
      
    </div>
  </div>
</header>
