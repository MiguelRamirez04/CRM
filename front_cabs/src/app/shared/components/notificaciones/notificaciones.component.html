<!-- =====================================================================================
     TEMPLATE NOTIFICACIONES - notificaciones.component.html
     =====================================================================================

     ¿QUÉ HACE ESTE ARCHIVO?
     Template HTML para el componente de notificaciones.
     Muestra un dropdown con la lista de notificaciones del usuario.

     ELEMENTOS:
     - Botón con icono de campana y badge de contador
     - Dropdown con lista de notificaciones
     - Indicador de estado de conexión SignalR
     - Acciones para marcar como leída

     ===================================================================================== -->

<div class="relative">
  <!-- Botón de notificaciones -->
  <button (click)="toggleDropdown()"
          class="relative p-2 text-gray-600 hover:text-gray-900 focus:outline-none transition-colors duration-200">
    <!-- Icono de campana -->
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-5 5v-5zM4.868 12.683A17.925 17.925 0 0112 21c7.962 0 12-1.21 12-2.683m-12 2.683a17.925 17.925 0 01-7.132-8.317M12 21c4.411 0 8-4.03 8-9s-3.589-9-8-9-8 4.03-8 9a9.06 9.06 0 001.832 5.445L4 21l7.868-2.317z"></path>
    </svg>

    <!-- Badge de notificaciones no leídas -->
    <span *ngIf="notificacionesNoLeidas > 0"
          class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center animate-pulse">
      {{notificacionesNoLeidas}}
    </span>
  </button>

  <!-- Dropdown de notificaciones -->
  <div *ngIf="mostrarDropdown"
       class="absolute right-0 mt-2 w-96 bg-white rounded-lg shadow-xl border border-gray-200 z-50 max-h-96 overflow-hidden"
       clickOutside
       (clickOutside)="mostrarDropdown = false">

    <!-- Header del dropdown -->
    <div class="p-4 border-b border-gray-200 bg-gray-50">
      <div class="flex justify-between items-center">
        <h3 class="text-lg font-semibold text-gray-900">Notificaciones</h3>
        <span class="text-sm {{getConnectionStatusClass()}}">
          {{getConnectionStatusText()}}
        </span>
      </div>
    </div>

    <!-- Lista de notificaciones -->
    <div class="max-h-80 overflow-y-auto">
      <div *ngFor="let notif of notificaciones"
           class="p-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors duration-150 {{getPrioridadClass(notif.prioridad)}}"
           (click)="marcarComoLeida(notif, $event)">

        <div class="flex justify-between items-start space-x-3">
          <!-- Contenido de la notificación -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center space-x-2">
              <p class="font-medium text-sm text-gray-900 truncate">{{notif.titulo}}</p>
              <span *ngIf="!notif.leida"
                    class="inline-block w-2 h-2 bg-blue-500 rounded-full flex-shrink-0"></span>
            </div>

            <p class="text-gray-600 text-sm mt-1 line-clamp-2">{{notif.mensaje}}</p>

            <div class="flex items-center justify-between mt-2">
              <p class="text-xs text-gray-400">
                {{notif.fechaCreacion | date:'short'}}
              </p>

              <!-- Badge de prioridad -->
              <span class="px-2 py-1 text-xs rounded-full font-medium"
                    [ngClass]="{
                      'bg-red-100 text-red-800': notif.prioridad === 'ALTA',
                      'bg-yellow-100 text-yellow-800': notif.prioridad === 'MEDIA',
                      'bg-green-100 text-green-800': notif.prioridad === 'BAJA'
                    }">
                {{notif.prioridad}}
              </span>
            </div>
          </div>

          <!-- Icono de acción -->
          <div class="flex-shrink-0">
            <svg *ngIf="!notif.leida"
                 class="w-4 h-4 text-blue-500"
                 fill="currentColor"
                 viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
            </svg>
          </div>
        </div>

        <!-- Acción sugerida -->
        <div *ngIf="notif.accion" class="mt-3">
          <button class="text-xs text-blue-600 hover:text-blue-800 underline hover:no-underline transition-all duration-150">
            {{notif.accion}}
          </button>
        </div>
      </div>

      <!-- Estado vacío -->
      <div *ngIf="notificaciones.length === 0"
           class="p-8 text-center text-gray-500">
        <svg class="w-12 h-12 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-5 5v-5zM4.868 12.683A17.925 17.925 0 0112 21c7.962 0 12-1.21 12-2.683m-12 2.683a17.925 17.925 0 01-7.132-8.317M12 21c4.411 0 8-4.03 8-9s-3.589-9-8-9-8 4.03-8 9a9.06 9.06 0 001.832 5.445L4 21l7.868-2.317z"></path>
        </svg>
        <p class="text-sm">No hay notificaciones</p>
        <p class="text-xs text-gray-400 mt-1">Las nuevas notificaciones aparecerán aquí</p>
      </div>
    </div>

    <!-- Footer con acciones -->
    <div *ngIf="notificaciones.length > 0" class="p-3 border-t border-gray-200 bg-gray-50">
      <button class="w-full text-sm text-gray-600 hover:text-gray-900 transition-colors duration-150">
        Ver todas las notificaciones
      </button>
    </div>
  </div>
</div>
