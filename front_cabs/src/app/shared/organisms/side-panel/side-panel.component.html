<div *ngIf="mostrar" class="fixed inset-0 z-50 overflow-hidden">
  
  <!-- Overlay -->
  <div class="panel-overlay absolute inset-0 transition-opacity" (click)="onCerrar()"></div>
  
  <!-- Panel -->
 <!-- Panel con margen -->
  <div class="absolute inset-y-0 right-0 flex max-w-full pl-10">
    
    <div 
      class="w-screen transform transition-transform bg-white shadow-xl flex flex-col max-w-md m-4 rounded-2xl overflow-hidden"
      (click)="$event.stopPropagation()">
      <!-- Header -->
      <div class="flex justify-between items-center px-6 py-4 border-b border-gray-200 bg-gray-50">
        <h2 class="text-xl font-bold text-gray-800">{{ titulo }}</h2>
        <button type="button" 
                class="p-2 text-gray-500 hover:text-gray-700 transition-colors rounded-lg hover:bg-gray-100"
                (click)="onCerrar()">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Contenido scrolleable -->
      <div class="flex-1 overflow-y-auto px-6 py-6">
        <ng-content></ng-content>
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 border-t border-gray-200 bg-gray-50">
        <ng-content select="[footer]"></ng-content>
      </div>

    </div>
  </div>
</div>
