<div
  class="relative bg-white rounded-xl shadow-sm transition-all duration-300 ease-in-out"
  [ngClass]="{
    'border-2 border-red-600': control.invalid && control.touched,
    'border border-[#1e3a8a]/30 hover:shadow-md focus-within:ring-2 focus-within:ring-[#1e3a8a] focus-within:border-[#1e3a8a]':
      !(control.invalid && control.touched)
  }"
>
  <!-- ÍCONO SEGÚN EL TIPO -->
  <ng-container [ngSwitch]="icon">

    <!-- ICONO EMAIL -->
    <svg
      *ngSwitchCase="'email'"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      [attr.class]="
        control.invalid && control.touched
          ? 'absolute left-3 top-3 w-5 h-5 pointer-events-none text-red-600'
          : 'absolute left-3 top-3 w-5 h-5 pointer-events-none text-[#1e3a8a]'
      "
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M21.75 6.75v10.5..."
      />
    </svg>

    <!-- ICONO BUSQUEDA -->
    <svg
      *ngSwitchCase="'search'"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      class="absolute left-3 top-3 w-5 h-5 pointer-events-none"
      [ngClass]="{
        'text-red-600': control.invalid && control.touched,
        'text-[#1e3a8a]': !(control.invalid && control.touched)
      }"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="m21 21-5.197-5.197..."
      />
    </svg>

    <!-- ICONO FILTRO -->
    <svg
      *ngSwitchCase="'filter'"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      class="absolute left-3 top-3 w-5 h-5 pointer-events-none"
      [ngClass]="{
        'text-red-600': control.invalid && control.touched,
        'text-[#1e3a8a]': !(control.invalid && control.touched)
      }"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 3c2.755 0..."
      />
    </svg>

  </ng-container>

  <!-- INPUT -->
  <input
    [type]="type"
    [placeholder]="placeholder"
    [formControl]="control"
    class="w-full bg-transparent text-gray-800 font-medium rounded-xl py-2.5 pl-10 pr-3 focus:outline-none transition"
  />
</div>

<!-- MENSAJE DE ERROR -->
<p
  *ngIf="control.invalid && control.touched"
  class="text-red-600 text-sm mt-1.5 flex items-center gap-1 font-medium"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="2"
    stroke="currentColor"
    class="w-4 h-4"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M12 9v3.75..."
    />
  </svg>

  <span *ngIf="control.errors?.['required']">
    Este campo es requerido.
  </span>

  <span *ngIf="control.errors?.['email']">
    Formato de correo inválido.
  </span>
</p>
