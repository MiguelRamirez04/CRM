<span class="etiqueta" [ngClass]="'etiqueta-' + tipo" [ngStyle]="
    tipo === 'personalizado'
      ? { 'background-color': colorFondo, color: colorTexto }
      : {}
  ">
  <ng-container [ngSwitch]="tipo">
    <!-- Sin seguimiento -->
    <svg *ngSwitchCase="'sin-seguimiento'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
    </svg>

    <!-- Requiere seguimiento -->
    <svg *ngSwitchCase="'requiere-seguimiento'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
    </svg>

    <!-- Nuevo -->

    <svg *ngSwitchCase="'nuevo'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
    </svg>


    <!--  Revisión -->
    <svg *ngSwitchCase="'revision'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
    </svg>

    <!--  Rechazado -->
    <svg *ngSwitchCase="'rechazado'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
    </svg>

    <!-- Enviada -->
    <svg *ngSwitchCase="'enviada'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
    </svg>

    <!-- Aprobado -->
    <svg *ngSwitchCase="'aprobado'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
    </svg>

    <!-- venta realizada -->
   
<svg *ngSwitchCase="'venta-realizada'" class="icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5">
  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" />
</svg>

    <!-- Personalizado -->
    <ng-container *ngSwitchCase="'personalizado'">
      <span class="icono-personalizado" [innerHTML]="svgSeguro"></span>
    </ng-container>
  </ng-container>

  {{ texto }}
</span>
