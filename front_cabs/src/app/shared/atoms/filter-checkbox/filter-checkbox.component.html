<label class="filter-checkbox-container flex items-start gap-3 p-2 rounded hover:bg-gray-50 cursor-pointer transition-colors"
  [class.disabled]="disabled">
  
  <input 
    type="checkbox"
    [checked]="checked"
    [disabled]="disabled"
    [value]="value"
    (change)="onCheckboxChange($event)"
    class="checkbox-input mt-1 h-4 w-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 focus:ring-2 disabled:opacity-50 disabled:cursor-not-allowed"
  />
  
  <span class="checkbox-content flex-1">
    <span class="checkbox-label block text-sm text-gray-900 font-medium">
      {{ label }}
    </span>
    <span *ngIf="description" class="checkbox-description block text-xs text-gray-500 mt-1">
      {{ description }}
    </span>
  </span>
</label>
