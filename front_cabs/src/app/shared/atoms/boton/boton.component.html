<button 
  [type]="tipo"
  [ngClass]="obtenerClasesTailwind()"
  [ngStyle]="estilosPersonalizados"
  [disabled]="estaInactivo()"
  (click)="manejarClick($event)">
  
  <!-- Icono de carga (spinner) -->
  <span *ngIf="estaCargando" class="inline-block w-5 h-5">
    <svg 
      class="w-full h-full animate-spin" 
      xmlns="http://www.w3.org/2000/svg" 
      fill="none" 
      viewBox="0 0 24 24"
      [ngStyle]="estilosIcono">
      <circle 
        class="opacity-25" 
        cx="12" 
        cy="12" 
        r="10" 
        stroke="currentColor" 
        stroke-width="4">
      </circle>
      <path 
        class="opacity-75" 
        fill="currentColor" 
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
      </path>
    </svg>
  </span>

  <!-- Icono personalizado (tiene prioridad sobre los demás) -->
  <span 
    *ngIf="!estaCargando && iconoPersonalizado" 
    [innerHTML]="iconoSanitizado"
    class="inline-flex w-5 h-5 shrink-0 [&>svg]:w-full [&>svg]:h-full"
    [ngStyle]="estilosIcono">
  </span>

  <!-- Icono predeterminado (rayo/acción) -->
  <svg 
    *ngIf="!estaCargando && mostrarIcono && !iconoPersonalizado" 
    class="w-5 h-5" 
    fill="none" 
    stroke="currentColor" 
    viewBox="0 0 24 24"
    [ngStyle]="estilosIcono">
    <path 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      stroke-width="2" 
      d="M13 10V3L4 14h7v7l9-11h-7z">
    </path>
  </svg>

  <!-- Texto del botón (solo si tiene contenido) -->
  <span *ngIf="texto && texto.trim()">{{ obtenerTexto() }}</span>
</button>
