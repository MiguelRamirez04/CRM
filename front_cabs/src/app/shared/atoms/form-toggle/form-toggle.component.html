<div class="form-toggle-wrapper">
  <div class="toggle-container">
    <label *ngIf="label" class="form-label">
      {{ label }}
    </label>
    
    <button
      type="button"
      role="switch"
      [attr.aria-checked]="value"
      class="toggle-button"
      [class]="toggleSizeClass"
      [class.active]="value"
      [class.disabled]="disabled"
      [disabled]="disabled"
      (click)="onToggle()"
    >
      <span class="toggle-slider"></span>
    </button>
  </div>
  
  <span *ngIf="helpText" class="help-text">
    {{ helpText }}
  </span>
</div>
