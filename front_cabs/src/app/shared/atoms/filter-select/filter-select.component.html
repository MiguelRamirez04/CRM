<div class="filter-select-wrapper relative">
  
  <!-- Select -->
  <select
    [value]="value || ''"
    [disabled]="disabled"
    (change)="onSelectChange($event)"
    class="filter-select w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg appearance-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white transition-all disabled:bg-gray-100 disabled:cursor-not-allowed"
  >
    <option value="">{{ placeholder }}</option>
    <option *ngFor="let option of options" [value]="option.valor">
      {{ option.etiqueta }}
    </option>
  </select>

  <!-- Icono de flecha usando IconoComponent -->
  <div class="select-icon absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none">
    <app-ui-icono 
      [name]="'chevron-down'" 
      [size]="'h-5 w-5'" 
      [color]="disabled ? 'text-gray-400' : 'text-gray-500'">
    </app-ui-icono>
  </div>
</div>
