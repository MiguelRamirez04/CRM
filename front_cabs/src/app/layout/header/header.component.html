<!-- =====================================================================================
     HEADER PRINCIPAL - header.component.html
     =====================================================================================

     ¿QUÉ CONTIENE ESTE HEADER?
     Barra de navegación superior con notificaciones y menú de usuario.
     Se muestra en la parte superior de todas las páginas del dashboard.

     ELEMENTOS:
     - Logo/branding
     - Componente de notificaciones
     - Información del usuario
     - Menú desplegable de usuario
     - Indicador de conexión SignalR

     ===================================================================================== -->

<header class="bg-white shadow-sm border-b border-gray-200 px-6 py-3">
  <div class="flex items-center justify-between">

    <!-- Logo y título -->
    <div class="flex items-center space-x-4">
      <h1 class="text-xl font-semibold text-gray-900">CABS</h1>
      <span class="text-sm text-gray-500">Sistema de Gestión</span>
    </div>

    <!-- Panel derecho: Notificaciones y Usuario -->
    <div class="flex items-center space-x-4">

      <!-- Indicador de conexión SignalR -->
      <div class="flex items-center space-x-2 text-sm">
        <div class="flex items-center space-x-1">
          <div [class]="'w-2 h-2 rounded-full ' + (signalRConectado ? 'bg-green-500' : 'bg-red-500')"></div>
          <span [class]="'text-xs ' + (signalRConectado ? 'text-green-600' : 'text-red-600')">
            {{ signalRConectado ? 'Conectado' : 'Desconectado' }}
          </span>
        </div>
      </div>

      <!-- Componente de notificaciones -->
      <app-notificaciones></app-notificaciones>

      <!-- Separador -->
      <div class="h-6 w-px bg-gray-300"></div>

      <!-- Menú de usuario -->
      <div class="relative">
        <button (click)="toggleMenuUsuario()"
                class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-100 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500">

          <!-- Avatar -->
          <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-sm font-medium">
            {{ usuarioActual?.nombre?.charAt(0)?.toUpperCase() || 'U' }}
          </div>

          <!-- Información del usuario -->
          <div class="hidden md:block text-left">
            <p class="text-sm font-medium text-gray-900">{{ usuarioActual?.nombre || 'Usuario' }}</p>
            <p class="text-xs text-gray-500">{{ usuarioActual?.rol || 'Sin rol' }}</p>
          </div>

          <!-- Icono de flecha -->
          <svg class="w-4 h-4 text-gray-400 transition-transform duration-200"
               [class.rotate-180]="mostrarMenuUsuario"
               fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>

        <!-- Dropdown del menú de usuario -->
        <div *ngIf="mostrarMenuUsuario"
             class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 z-50"
             clickOutside
             (clickOutside)="onClickOutside()">

          <div class="p-3 border-b border-gray-200">
            <p class="text-sm font-medium text-gray-900">{{ usuarioActual?.nombre }}</p>
            <p class="text-xs text-gray-500">{{ usuarioActual?.email }}</p>
          </div>

          <div class="py-1">
            <a href="#" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-150">
              <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
              Perfil
            </a>

            <a href="#" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-150">
              <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
              Configuración
            </a>
          </div>

          <div class="border-t border-gray-200">
            <button (click)="logout()"
                    class="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors duration-150">
              <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
              </svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
