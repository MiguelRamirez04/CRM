<!--Contenedor del contendio -->
<div>
    <!--Contenedor texto y botón-->
    <div class="flex items-center justify-between w-full p-4">
        <h3 class="font-medium  text-2xl">Calendario</h3>
        <button class="px-4 py-2 bg-[#34428F] text-black rounded-md  hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 transition duration-200">
            <p class="font-medium text-s text-white">Crear eventos</p>
        </button>
    </div>
    <!--Contenido -->
    <div class="flex justify-between bg-blue-500 p-[20px] rounded-[20px]">
        <!--Vista Calendario y Lista de los Calendarios -->
        <div class="w-1/3 bg-red-500 h-screen">
            <p>Texto de prueba</p>
            <full-calendar [options]="calendarOptionsSecundario"></full-calendar>
        </div>
        <!--Vista Calendario-->
        <div class="w-full">
            <div class="calendar-controls">
                <button class="nav-btn" (click)="goToPrev()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                    </svg>
                </button>
                <button class="nav-btn" (click)="goToNext()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
                    </svg>
                </button>
                <button class="nav-btn" (click)="goToToday()">Hoy</button>
            </div>
            <h2 class="calendar-title">{{ calendarTitle }}</h2>            <nav class="tab-nav">
                <button class="tab-btn" [class.active]="activeView === 'multiMonthYear'" (click)="setView('multiMonthYear')">
                    <span>Año</span>
                </button>
                <button class="tab-btn" [class.active]="activeView === 'dayGridMonth'" (click)="setView('dayGridMonth')">
                    <span>Mes</span>
                </button>
                <button class="tab-btn" [class.active]="activeView === 'timeGridWeek'" (click)="setView('timeGridWeek')">
                    <span>Semana</span>
                </button>
                <button class="tab-btn" [class.active]="activeView === 'timeGridDay'" (click)="setView('timeGridDay')">
                    <span class="span-contenido">Día</span>
                </button>
            </nav>
            <full-calendar #calendarPrincipal [options]="calendarOptions"></full-calendar>
        </div>

    </div>


</div>
