<div class="container-fluid profile-container">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-9">
          <div class="card profile-card shadow-lg border-0">
            <div class="card-header profile-header text-white text-center">
              <div class="avatar-container my-3">
                <div class="avatar-circle">
                  <i class="fas fa-user-circle fa-5x"></i>
                </div>
              </div>
              <h3 class="mb-0">{{ currentUser?.name }}</h3>
              <p class="text-white-50 mb-2">{{ currentUser?.email }}</p>
              <span class="badge bg-light text-primary">{{ currentUser?.role }}</span>
            </div>
            <div class="card-body p-4">
              <div class="row">
                <div class="col-md-6 mb-4 mb-md-0">
                  <h5 class="mb-4 text-primary fw-bold">Información del Perfil</h5>
                  <div class="info-item mb-3">
                    <i class="fas fa-user-tag me-2 text-primary"></i>
                    <strong>Nombre:</strong>
                    <span>{{ currentUser?.name }}</span>
                  </div>
                  <div class="info-item mb-3">
                    <i class="fas fa-envelope me-2 text-primary"></i>
                    <strong>Email:</strong>
                    <span>{{ currentUser?.email }}</span>
                  </div>
                  <div class="info-item mb-3">
                    <i class="fas fa-shield-alt me-2 text-primary"></i>
                    <strong>Rol:</strong>
                    <span>{{ currentUser?.role }}</span>
                  </div>
                  <div class="info-item">
                    <i class="fas fa-check-circle me-2 text-success"></i>
                    <strong>Estado:</strong>
                    <span class="badge bg-success">Activo</span>
                  </div>
                </div>
                <div class="col-md-6">
                  <h5 class="mb-4 text-primary fw-bold">Permisos Asignados</h5>
                  <div class="permissions-container">
                    <span *ngFor="let permission of currentUser?.permissions" class="badge permission-badge me-2 mb-2">
                      <i class="fas fa-check me-1"></i>
                      {{ permission }}
                    </span>
                  </div>
                </div>
              </div>
              <hr class="my-4" />
              <div class="text-center">
                <button class="btn btn-primary me-2" (click)="editProfile()">
                  <i class="fas fa-edit me-1"></i>
                  Editar Perfil
                </button>
                <button class="btn btn-outline-primary" (click)="changePassword()">
                  <i class="fas fa-key me-1"></i>
                  Cambiar Contraseña
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
