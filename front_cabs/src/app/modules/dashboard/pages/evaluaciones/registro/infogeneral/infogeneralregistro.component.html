<app-loading-overlay 
  [visible]="cargando" 
  [mensaje]="'Cargando evaluación...'"
  [fixed]="false">
</app-loading-overlay>

<div class="contenedor">
  <!-- ===================== VISTA: INFO GENERAL ===================== -->
  <div *ngIf="vistaActual === 'infoGeneral'" class="contenedor-2">
    
    <!-- Mensaje informativo -->
    <app-form-info-alert
      [type]="modoOperacion === 'editar' ? 'warning' : 'info'"
      [message]="mensajeInformativo"
      [showIcon]="true">
    </app-form-info-alert>

    <!-- FORMULARIO PRINCIPAL -->
    <app-form-section [title]="''">
      
      <!-- FILA 1: Orden y Ejecución -->
      <app-form-row [columns]="2" [gap]="'medium'">
        
        <!-- ORDEN - CREAR -->
        <app-form-select
          *ngIf="modoOperacion === 'crear'"
          [label]="'Orden de trabajo'"
          [required]="true"
          [options]="ordenesOptions"
          [loading]="cargandoCatalogos.ordenes"
          [loadingText]="'Cargando órdenes...'"
          [emptyText]="'No hay órdenes disponibles'"
          [placeholder]="'Seleccione una orden'"
          [(ngModel)]="formulario.ordenTrabajoId"
          (valueChange)="onOrdenChange()">
        </app-form-select>

        <!-- ORDEN - EDITAR -->
        <app-locked-field
          *ngIf="modoOperacion === 'editar'"
          [label]="'Orden de trabajo'"
          [required]="true"
          [value]="textoOrdenBloqueada || 'OT-' + formulario.ordenTrabajoId"
          [helpText]="'Este campo no se puede modificar después de crear la evaluación'">
        </app-locked-field>

        <!-- EJECUCIÓN - CREAR -->
        <app-form-select
          *ngIf="modoOperacion === 'crear'"
          [label]="'Ejecución (opcional)'"
          [required]="false"
          [options]="ejecucionesOptions"
          [loading]="cargandoCatalogos.ejecuciones"
          [loadingText]="'Cargando ejecuciones...'"
          [emptyText]="!formulario.ordenTrabajoId ? 'Seleccione primero una orden' : 'No hay ejecuciones para esta orden'"
          [placeholder]="'Sin ejecución específica'"
          [disabled]="!formulario.ordenTrabajoId"
          [(ngModel)]="formulario.ejecucionId"
          (valueChange)="onFormularioChange()">
        </app-form-select>

        <!-- EJECUCIÓN - EDITAR -->
        <app-locked-field
          *ngIf="modoOperacion === 'editar'"
          [label]="'Ejecución'"
          [value]="textoEjecucionBloqueada || 'Sin ejecución'">
        </app-locked-field>

      </app-form-row>

      <!-- FILA 2: Evaluador -->
      <app-form-row [columns]="2" [gap]="'medium'">
        
        <!-- EVALUADOR - CREAR -->
        <app-form-select
          *ngIf="modoOperacion === 'crear'"
          [label]="'Evaluador'"
          [required]="true"
          [options]="evaluadoresOptions"
          [loading]="cargandoCatalogos.usuario"
          [loadingText]="'Cargando usuario...'"
          [placeholder]="'Seleccione evaluador'"
          [helpText]="usuarioActual ? 'Usuario actual: ' + usuarioActual.nombreCompleto : ''"
          [(ngModel)]="formulario.evaluadorId"
          (valueChange)="onFormularioChange()">
        </app-form-select>

        <!-- EVALUADOR - EDITAR -->
        <app-locked-field
          *ngIf="modoOperacion === 'editar'"
          [label]="'Evaluador'"
          [required]="true"
          [value]="textoEvaluadorBloqueado || 'Evaluador #' + formulario.evaluadorId">
        </app-locked-field>

      </app-form-row>

      <!-- OBJETIVO -->
      <app-form-input
        [label]="'Objetivo de la evaluación'"
        [placeholder]="'Ej: verificar la calidad del servicio prestado'"
        [type]="'text'"
        [(ngModel)]="formulario.objetivo"
        (valueChange)="onFormularioChange()">
      </app-form-input>

      <div class="grupo-formulario" style="margin-top: 15px;">
        <label class="etiqueta descripcion">Describa el propósito principal de esta evaluación</label>
      </div>

      <!-- COMENTARIOS GENERALES -->
      <app-form-textarea
        [label]="'Comentarios generales'"
        [placeholder]="'Observaciones generales sobre la evaluación...'"
        [rows]="4"
        [(ngModel)]="formulario.comentariosGenerales"
        (valueChange)="onFormularioChange()">
      </app-form-textarea>

      <!-- FILA DE PUNTUACIÓN Y SEGUIMIENTO -->
      <app-form-row [columns]="3" [gap]="'medium'" [alignItems]="'center'">
        
        <!-- SCORE -->
        <app-score-display
          [label]="'Score de calidad total'"
          [score]="formulario.scoreCalidad"
          [maxScore]="100"
          [showMaxScore]="true"
          [size]="'medium'"
          [readonly]="true">
        </app-score-display>

        <!-- TOGGLE SEGUIMIENTO -->
        <app-form-toggle
          [label]="'¿Requiere seguimiento?'"
          [disabled]="false"
          [(ngModel)]="formulario.requiereSeguimiento"
          (toggle)="onFormularioChange()">
        </app-form-toggle>

        <!-- ESTATUS -->
        <div class="grupo-formulario">
          <label class="etiqueta">Estatus del seguimiento</label>
          <span 
            class="estatus"
            [ngClass]="formulario.requiereSeguimiento ? 'estatus-alerta' : 'estatus-exito'">
            <svg 
              *ngIf="!formulario.requiereSeguimiento" 
              xmlns="http://www.w3.org/2000/svg" 
              fill="none"
              viewBox="0 0 24 24" 
              stroke-width="1.5" 
              stroke="currentColor" 
              class="icono-alerta">
              <path 
                stroke-linecap="round" 
                stroke-linejoin="round"
                d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            <svg 
              *ngIf="formulario.requiereSeguimiento" 
              xmlns="http://www.w3.org/2000/svg" 
              fill="none"
              viewBox="0 0 24 24" 
              stroke-width="1.5" 
              stroke="currentColor" 
              class="icono-alerta">
              <path 
                stroke-linecap="round" 
                stroke-linejoin="round"
                d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
            </svg>
            {{ estatusSeguimiento }}
          </span>
        </div>

      </app-form-row>

      <!-- ALERTAS INFORMATIVAS -->
      <app-form-info-alert
        type="info"
        [message]="'La calificación total se generará automáticamente al completar las dos fases de la evaluación'"
        [showIcon]="true">
      </app-form-info-alert>

      <app-form-info-alert
        *ngIf="modoOperacion === 'editar'"
        type="warning"
        [showIcon]="true">
        <strong>Modo Edición:</strong> Los campos con candado (Orden, Ejecución y Evaluador) 
        no se pueden modificar una vez creada la evaluación. Solo puede editar: Objetivo, 
        Comentarios, Seguimiento y las fases ANTES/DESPUÉS.
      </app-form-info-alert>

      <!-- NOTAS DEL SEGUIMIENTO -->
      <app-form-textarea
        [label]="'Notas del seguimiento'"
        [placeholder]="'Acciones o puntos a dar seguimiento...'"
        [rows]="4"
        [(ngModel)]="formulario.notasSeguimiento"
        (valueChange)="onFormularioChange()">
      </app-form-textarea>

    </app-form-section>
  </div>

  <!-- ===================== VISTA: FASE ANTES ===================== -->
  <div *ngIf="vistaActual === 'faseAntes'" class="vista-fase">
    <app-fase-antes-modal
      [modoOperacion]="modoOperacion"
      [evaluacionId]="evaluacionId"
      [esVistaEmbebida]="true"
      (cerrar)="navegarASeccion('infoGeneral')">
    </app-fase-antes-modal>
  </div>

  <!-- ===================== VISTA: FASE DESPUÉS ===================== -->
  <div *ngIf="vistaActual === 'faseDespues'" class="vista-fase">
    <app-fase-despues-modal
      [modoOperacion]="modoOperacion"
      [evaluacionId]="evaluacionId"
      [esVistaEmbebida]="true"
      (cerrar)="navegarASeccion('infoGeneral')">
    </app-fase-despues-modal>
  </div>
</div>
