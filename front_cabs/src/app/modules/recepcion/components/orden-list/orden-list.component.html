<div class="table-responsive">
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Tipo</th>
        <th>Estado</th>
        <th>Prioridad</th>
        <th>Fecha Cita</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="loading">
        <td colspan="7" class="text-center">
          <div class="spinner-border spinner-border-sm" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
          Cargando órdenes...
        </td>
      </tr>
      <tr *ngIf="!loading && ordenes.length === 0">
        <td colspan="7" class="text-center text-muted">
          No hay órdenes para mostrar
        </td>
      </tr>
      <tr *ngFor="let orden of ordenes" class="align-middle">
        <td>{{ orden.id }}</td>
        <td>{{ orden.nombreCliente }}</td>
        <td>
          <span class="badge bg-primary">{{ orden.tipoOrden }}</span>
        </td>
        <td>
          <span class="badge"
                [ngClass]="{
                  'bg-warning': orden.estado === 'CAPTURADA',
                  'bg-info': orden.estado === 'ASIGNADA',
                  'bg-primary': orden.estado === 'EN_PROCESO',
                  'bg-success': orden.estado === 'COMPLETADA',
                  'bg-danger': orden.estado === 'CANCELADA'
                }">
            {{ orden.estado }}
          </span>
        </td>
        <td>{{ orden.prioridad }}</td>
        <td>{{ orden.citaProgramadaInicio | date:'short' }}</td>
        <td>
          <div class="btn-group btn-group-sm" role="group">
            <button type="button"
                    class="btn btn-outline-primary"
                    (click)="onVerDetalles(orden.id)"
                    title="Ver detalles">
              <i class="bi bi-eye"></i>
            </button>
            <button type="button"
                    class="btn btn-outline-secondary"
                    (click)="onEditar(orden.id)"
                    title="Editar">
              <i class="bi bi-pencil"></i>
            </button>
            <button type="button"
                    class="btn btn-outline-danger"
                    (click)="onEliminar(orden.id)"
                    title="Eliminar">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
