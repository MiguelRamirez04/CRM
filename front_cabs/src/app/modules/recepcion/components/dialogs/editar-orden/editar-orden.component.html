<div class="w-full max-w-5xl max-h-[95vh] bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-modal-appear">
  <!-- Header -->
  <div class="px-6 py-5 bg-gradient-to-r from-orange-500 to-amber-600 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-edit text-white text-2xl"></i>
      <h2 class="text-2xl font-bold text-white">Editar Orden #{{ orden.id }}</h2>
    </div>
    <button 
      (click)="onCancelar()"
      class="text-white hover:bg-white/20 rounded-lg p-2 transition-colors"
      type="button">
      <i class="fas fa-times text-xl"></i>
    </button>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto p-6">
    <app-orden-form 
      [ordenExistente]="orden"
      [loading]="loading"
      (guardar)="onGuardarEdicion($event)"
      (cancelar)="onCancelar()">
    </app-orden-form>
  </div>
</div>
