
<div class="contenedor-principal">
  <!-- Header con Título -->
  <app-ui-header titulo="Gastos de Viáticos" descripcion="Gestiona, consulta y administra gastos de viáticos"
    [visualizarDescripcion]="true" [visualizarButton]="false">
    <!-- Buscador + botón nuevo viático -->
    <app-buscador-filtro [configuracion]="configuracionBuscador" [valorBusqueda]="terminoBusqueda"
      (cambioBusqueda)="onBuscar($event)" (clicFiltro)="abrirModalFiltros()" (clicNuevo)="nuevoViatico()">
    </app-buscador-filtro>
  </app-ui-header>


  <!-- Mensajes de Éxito y Error -->
  <div *ngIf="mensajeExito"
    class="flex items-center p-4 mb-4 rounded-lg bg-green-50 text-green-800 border border-green-200">
    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd"
        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
        clip-rule="evenodd"></path>
    </svg>
    {{ mensajeExito }}
  </div>

  <div *ngIf="mensajeError" class="flex items-center p-4 mb-4 rounded-lg bg-red-50 text-red-800 border border-red-200">
    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd"
        d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
        clip-rule="evenodd"></path>
    </svg>
    {{ mensajeError }}
  </div>

  <!-- Componente Dialog -->
  <app-viaticos-dialog [mostrar]="mostrarDialog" [viaticoEditar]="viaticoEditando" (cerrar)="cerrarDialog()"
    (guardadoExitoso)="onViaticoGuardado($event)">
  </app-viaticos-dialog>

  <!-- Componente Panel de Detalles -->
  <app-viaticos-detalle [mostrar]="mostrarDetalle" [viaticoId]="viaticoDetalleId" (cerrar)="cerrarDetalle()">
  </app-viaticos-detalle>

  <!-- Modal de Filtros -->
  <app-modal-filtros [visible]="mostrarModalFiltros" [configuracion]="configuracionFiltros"
    [filtrosAplicados]="filtrosActuales" (cerrar)="cerrarModalFiltros()" (aplicarFiltros)="aplicarFiltrosModal($event)"
    (limpiarFiltros)="limpiarFiltrosModal()">
  </app-modal-filtros>

 
  <!-- Templates Reutilizables (fuera de la tabla) -->
  <ng-template #plantillaOrden let-item>
    <span *ngIf="item.ordenId"
      class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
      #{{ item.ordenId }}
    </span>
    <span *ngIf="!item.ordenId" class="text-gray-400">-</span>
  </ng-template>

  <ng-template #plantillaGastos let-item>
    <span class="text-sm text-gray-700 max-w-xs truncate block" [title]="item.gastos">
      {{ item.gastos }}
    </span>
  </ng-template>

  <ng-template #plantillaKM let-item>
    <span class="text-sm text-gray-700">{{ item.kmRecorridos || '-' }}</span>
  </ng-template>

  <ng-template #plantillaMonto let-item>
    <span class="text-sm font-semibold text-green-600">
      {{ formatearMoneda(item.montoTotal) }}
    </span>
  </ng-template>

  <ng-template #plantillaFactura let-item>
    <app-status-dot [texto]="getLabelFactura(item.tieneFactura)" [tipo]="item.tieneFactura ? 'completado' : 'neutral'">
    </app-status-dot>
  </ng-template>

  <!-- Tabla de Viáticos -->
  <div class="">
    <app-tabla-listado [datos]="viaticos" [columnas]="columnasTabla" [acciones]="accionesTabla" [cargando]="cargando"
      [mensajeSinDatos]="'No se encontraron viáticos'" [mensajeCargando]="'Cargando viáticos...'"
      (filaClick)="verDetalle($event)">
    </app-tabla-listado>

    <!-- Paginación -->
    <div *ngIf="!cargando && viaticos.length > 0" class="">
      <app-paginacion [totalElementos]="totalItems" [paginaActual]="paginaActual"
        [configuracion]="configuracionPaginacion" (cambioPagina)="cambiarPagina($event)">
      </app-paginacion>
    </div>
  </div>
</div>
