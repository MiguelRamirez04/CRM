<!-- Modal Overlay con fondo difuminado -->
<div *ngIf="mostrar" 
     class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4"
     (click)="onCerrar()">
  
  <!-- Modal Container -->
  <div class="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-[90vh] overflow-hidden flex flex-col"
       (click)="$event.stopPropagation()">
    
    <!-- Header -->
    <div class="flex justify-between items-center p-6 border-b border-gray-200">
      <h2 class="text-2xl font-bold text-gray-800">{{ tituloDialog }}</h2>
      <button type="button" 
              class="p-2 text-gray-500 hover:text-gray-700 transition-colors"
              (click)="onCerrar()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <form [formGroup]="viaticoForm" (ngSubmit)="onGuardar()" class="p-6 overflow-y-auto flex-1 relative">
      
      <!-- Loading Overlay -->
      <div *ngIf="guardando" 
           class="absolute inset-0 bg-gray-900 bg-opacity-75 flex flex-col items-center justify-center z-10 rounded-lg">
        <div class="border-4 border-gray-200 border-t-blue-600 rounded-full w-12 h-12 animate-spin"></div>
        <p class="mt-4 text-white font-medium">{{ viaticoEditar ? 'Actualizando' : 'Guardando' }} viático...</p>
      </div>

      <!-- Mensaje de Error -->
      <div *ngIf="mensajeError" 
           class="flex items-center p-4 mb-4 rounded-lg bg-red-50 text-red-800 border border-red-200">
        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
        </svg>
        {{ mensajeError }}
      </div>

      <!-- Fila 1: Tiene Factura -->
      <div class="grid grid-cols-1 gap-4 mb-4">
        <div class="flex flex-col">
          <label class="flex items-center text-sm font-medium text-gray-700 cursor-pointer">
            <input 
              type="checkbox" 
              formControlName="tieneFactura"
              class="mr-2 w-4 h-4 text-blue-600 rounded focus:ring-2 focus:ring-blue-500">
            ¿Tiene Factura?
          </label>
        </div>
      </div>

      <!-- Fila 2: Proveedor (solo si tiene factura) -->
      <div *ngIf="viaticoForm.get('tieneFactura')?.value" class="grid grid-cols-1 gap-4 mb-4">
        <div class="flex flex-col">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Nombre del Proveedor <span class="text-red-500">*</span>
          </label>
          <input 
            type="text" 
            formControlName="proveedorNombre"
            [ngClass]="isFieldInvalid('proveedorNombre') ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-gray-300 focus:ring-blue-500 focus:border-blue-500'"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 transition-colors"
            placeholder="Nombre completo del proveedor">
          <span *ngIf="isFieldInvalid('proveedorNombre')" class="text-red-600 text-xs mt-1">
            {{ getFieldError('proveedorNombre') }}
          </span>
        </div>
      </div>

      <!-- Fila 3: Fecha y Monto Total -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="flex flex-col">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Fecha <span class="text-red-500">*</span>
          </label>
          <input 
            type="date" 
            formControlName="fecha"
            [ngClass]="isFieldInvalid('fecha') ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-gray-300 focus:ring-blue-500 focus:border-blue-500'"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 transition-colors">
          <span *ngIf="isFieldInvalid('fecha')" class="text-red-600 text-xs mt-1">
            {{ getFieldError('fecha') }}
          </span>
        </div>

        <div class="flex flex-col">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Monto Total <span class="text-red-500">*</span>
          </label>
          <input 
            type="number" 
            formControlName="montoTotal"
            [ngClass]="isFieldInvalid('montoTotal') ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-gray-300 focus:ring-blue-500 focus:border-blue-500'"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 transition-colors"
            placeholder="0.00"
            step="0.01"
            min="0.01">
          <span *ngIf="isFieldInvalid('montoTotal')" class="text-red-600 text-xs mt-1">
            {{ getFieldError('montoTotal') }}
          </span>
        </div>
      </div>

      <!-- Fila 4: KM Recorridos y Lugar Destino -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="flex flex-col">
          <label class="block text-sm font-medium text-gray-700 mb-1">Km Recorridos</label>
          <input 
            type="number" 
            formControlName="kmRecorridos"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            placeholder="0"
            min="0">
        </div>

        <div class="flex flex-col">
          <label class="block text-sm font-medium text-gray-700 mb-1">Lugar de Destino</label>
          <input 
            type="text" 
            formControlName="lugarDestino"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
            placeholder="Ciudad, estado">
        </div>
      </div>

      <!-- Fila 5: Gastos -->
      <div class="flex flex-col mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Descripción de Gastos <span class="text-red-500">*</span>
        </label>
        <input 
          type="text" 
          formControlName="gastos"
          [ngClass]="isFieldInvalid('gastos') ? 'border-red-500 focus:ring-red-500 focus:border-red-500' : 'border-gray-300 focus:ring-blue-500 focus:border-blue-500'"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 transition-colors"
          placeholder="Ej: Gasolina, Peajes, Estacionamiento">
        <span *ngIf="isFieldInvalid('gastos')" class="text-red-600 text-xs mt-1">
          {{ getFieldError('gastos') }}
        </span>
      </div>

      <!-- Fila 6: Descripción -->
      <div class="flex flex-col mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción Adicional</label>
        <textarea 
          formControlName="descripcion"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
          rows="3"
          placeholder="Detalles adicionales del viático..."></textarea>
      </div>

      <!-- Footer / Botones -->
      <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-200">
        <button type="button" 
                class="inline-flex items-center px-4 py-2 bg-gray-200 text-gray-700 font-medium rounded-lg hover:bg-gray-300 transition-colors"
                (click)="onCerrar()">
          Cancelar
        </button>
        <button type="submit" 
                class="inline-flex items-center px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                [disabled]="guardando">
          <svg *ngIf="!guardando" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
          {{ textoBoton }}
        </button>
      </div>
    </form>

  </div>
</div>
